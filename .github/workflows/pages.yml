name: Deploy frontend to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run type-check
      - run: npm run test
      - run: npm run build
        env:
          VITE_GITHUB_PAGES_BASE: ${{ vars.VITE_GITHUB_PAGES_BASE }}
          VITE_NHOST_SUBDOMAIN: ${{ vars.VITE_NHOST_SUBDOMAIN }}
          VITE_NHOST_REGION: ${{ vars.VITE_NHOST_REGION }}
          VITE_HASURA_GRAPHQL_URL: ${{ vars.VITE_HASURA_GRAPHQL_URL }}
          VITE_WORKER_API_URL: ${{ vars.VITE_WORKER_API_URL }}
          VITE_SESSION_TIMEOUT_MINUTES: ${{ vars.VITE_SESSION_TIMEOUT_MINUTES }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      # Intentionally no VITE_NHOST_* env: exercises the local-fallback auth
      # path (tests/e2e/app.spec.ts) with no live credentials required.
      # tests/e2e/phase8-live.spec.ts and login-nav-fix.spec.ts self-skip
      # without E2E_EMAIL/E2E_PASSWORD and are not run here.
      - run: npx playwright test tests/e2e/app.spec.ts
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
